  <path d="M 8  24 A 8 8 0 0 1 24 24"   stroke="#5E8C85" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <path d="M 4  24 A 12 12 0 0 1 28 24" stroke="#5E8C85" stroke-width="1.8" stroke-linecap="round" fill="none"/>
  <!-- Baseline -->
